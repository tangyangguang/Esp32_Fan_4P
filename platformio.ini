; PlatformIO Project Configuration File
; ESP32 + Esp32Base full-profile fan controller

[platformio]
default_envs = esp32dev
extra_configs =
    platformio.local.ini

[env:esp32dev]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200
lib_ldf_mode = deep+
extra_scripts =
    post:../Esp32Base/scripts/esp32base_webota.py

lib_deps =
    symlink://../Esp32Base
    ArduinoOTA
    WiFi
    DNSServer
    ESPmDNS
    LittleFS
    WebServer
    Update
    crankyoldgit/IRremoteESP8266@^2.8.6

build_flags =
    -DESP32BASE_PROFILE=ESP32BASE_PROFILE_FULL
    -DESP32BASE_LOG_LEVEL=ESP32BASE_LOG_DEBUG
    -DESP32BASE_WEB_MAX_ROUTES=16
    -DESP32BASE_EB_FILELOG_PATH=\"/logs/app.log\"
    -DESP32BASE_EB_FILELOG_MAX_BYTES=16384
    -DESP32BASE_EB_FILELOG_ROTATE_FILES=4
    -DESP32BASE_EB_FILELOG_LEVEL=ESP32BASE_LOG_INFO
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/ArduinoOTA/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/FS/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/Hash/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/DNSServer/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/ESPmDNS/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/LittleFS/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/WebServer/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/WiFi/src
    -I ${platformio.packages_dir}/framework-arduinoespressif32/libraries/Update/src

board_build.partitions = ../Esp32Base/partitions/esp32-4mb-ota-balanced.csv

; Web OTA credentials are intentionally not committed. Configure them locally via:
; [esp32base_webota]
; esp32base_webota_host = <device-ip-or-mdns>
; esp32base_webota_user = <web-auth-user>
; esp32base_webota_password = <web-auth-password>
; or environment variables ESP32BASE_WEBOTA_HOST / ESP32BASE_WEBOTA_USER / ESP32BASE_WEBOTA_PASSWORD.

[env:native]
platform = native
test_framework = unity
test_build_src = true
lib_deps =
    throwtheswitch/Unity@^2.6.1
build_flags =
    -I test
    -I src
    -DUNIT_TEST
    -DARDUINO=1000
    -DESP32BASE_PROFILE=ESP32BASE_PROFILE_FULL
test_ignore = test_desktop
build_src_filter =
    +<app/*.cpp>
    +<fan/*.cpp>
    +<web/*.cpp>
    -<main.cpp>
